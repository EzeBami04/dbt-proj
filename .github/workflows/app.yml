name: automate dbt project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -- non-cache-dir
          pip install dbt-core dbt-bigquery

      # Profiles setup BEFORE any dbt commands
      - name: Setup dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          dedamdev:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: ${{ secrets.BQ_DATASET }}
                keyfile_json: ${{ secrets.GCP_SA_KEY }}
                threads: 4
                timeout_seconds: 300
                location: ${{ secrets.BQ_LOCATION }}
          EOF

      - name: Debug environment
        run: dbt debug

      # Correct dbt run command
      - name: Run dbt
        run: dbt run

  deploy-dbt:
    needs: build
    runs-on: ubuntu-latest
    steps:
      #  deploy job needs its own setup
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-bigquery

      - name: Setup dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          dedamdev:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: ${{ secrets.BQ_DATASET }}
                keyfile_json: ${{ secrets.GCP_SA_KEY }}
                threads: 4
                timeout_seconds: 300
                location: ${{ secrets.BQ_LOCATION }}
          EOF

      - name: Run dbt seed
        run: dbt seed

      - name: Run dbt run
        run: dbt run

      - name: Run dbt tests
        run: dbt test

      #  Only generate docs, don't serve (would hang CI)
      - name: Generate dbt docs
        run: dbt docs generate