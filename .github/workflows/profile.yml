dedamdev:  
  target: dev
  outputs:

    dev:
      type: bigquery
      method: service-account
      project: "{{ secrets.DBT_GCP_PROJECT}}"
      dataset: "{{ secrets.DBT_DATASET_DEV}}" 
      keyfile: "{{ env_var('DBT_KEYFILE_PATH') }}"
      threads: 4
      timeout_seconds: 300
      location: US
